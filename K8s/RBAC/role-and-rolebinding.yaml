apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: 
  namespace: dev
  name: workload-editor
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create","list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create","list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-workload-editor
  namespace: dev
subjects:
- kind: User
  name: seema
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: junior-admins
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: workload-editor
  apiGroup: rbac.authorization.k8s.io