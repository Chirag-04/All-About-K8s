apiVersion: v1
kind: Pod
metadata: 
  name: hostpath-example-pod-2
spec:
  volumes:
  - name: host-volume
    hostPath:
      path: /tmp/hostfile
      type: FileOrCreate
  containers:
  - name: busybox-container-2
    image: busybox
    command: ["sh","-c","cat /data && sleep 3600"]
    volumeMounts:
    - mountPath: /data
      name: host-volume